<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Movie Finder</h1>
        <p>Type in a speech from a movie to find out more about it.</p>
        <textarea id="speech-input" placeholder="Enter movie speech here..."></textarea>
        <button id="search-btn">Search</button>
        <div id="movie-details"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
